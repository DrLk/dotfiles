# Picture-in-a-Picture (PIP) rules
windowrule {
    name = pip
    match:title = ^(Picture-in-Picture)$
    opacity = 1.0 1.0
    pin = yes
    float = yes
    size = 17.8% 24%
    move = 72% 7%
}
