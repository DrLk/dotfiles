windowrule {
    name = float-polkit
    match:class = org.kde.polkit-kde-authentication-agent-1
    float = yes
}

windowrule {
    name = float-nm-blueman
    match:class = nm-connection-editor|blueman-manager
    float = yes
}

windowrule {
    name = float-pavucontrol
    match:class = org.pulseaudio.pavucontrol
    float = yes
    center = yes
}

windowrule {
    name = float-misc
    match:class = nwg-look|qt5ct|mpv
    float = yes
}

windowrule {
    name = float-onedriver
    match:class = onedriver|onedriver-launcher
    float = yes
}

windowrule {
    name = float-eog
    match:class = eog
    float = yes
}

windowrule {
    name = float-zoom
    match:class = zoom
    float = yes
}

windowrule {
    name = float-rofi
    match:class = rofi
    float = yes
}

windowrule {
    name = float-gnome-system-monitor
    match:class = gnome-system-monitor
    float = yes
}

windowrule {
    name = float-yad
    match:class = yad
    float = yes
}

windowrule {
    name = float-wihotspot
    match:class = ^(wihotspot-gui)$
    float = yes
}

windowrule {
    name = float-evince
    match:class = ^(evince)$
    float = yes
}

windowrule {
    name = float-file-roller
    match:class = ^(file-roller)$
    float = yes
}

