windowrule {
    name = workspace-thunderbird
    match:class = ^([Tt]hunderbird)$
    workspace = 1
}

windowrule {
    name = workspace-firefox
    match:class = ^([Ff]irefox|org.mozilla.firefox|[Ff]irefox-esr|Microsoft-edge-beta)$
    workspace = 2
}

windowrule {
    name = workspace-thunar
    match:class = ^([Tt]hunar)$
    workspace = 3
}

windowrule {
    name = workspace-obs
    match:class = ^(com.obsproject.Studio)$
    workspace = 4
}

windowrule {
    name = workspace-steam
    match:class = ^([Ss]team)$
    match:title = ^([Ss]team)$
    workspace = 5 silent
}

windowrule {
    name = workspace-lutris
    match:class = ^(lutris)$
    workspace = 5 silent
}

windowrule {
    name = workspace-virt-manager
    match:class = ^(virt-manager)$
    workspace = 6
}

windowrule {
    name = workspace-discord
    match:class = ^(discord|WebCord)$
    workspace = 7 silent
}

windowrule {
    name = workspace-audacious
    match:class = ^([Aa]udacious)$
    workspace = 9 silent
}

